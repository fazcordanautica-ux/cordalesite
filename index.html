<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORDALE/ Móveis Externos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap');
        
        :root {
            --black: #000000;
            --grey: #4A4A4A;
            --brown: #A68966;
            --soft-bg: #F9F9F9;
        }

        body { font-family: 'Inter', sans-serif; font-size: 10px; background-color: #fff; color: var(--black); overflow-x: hidden; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Grelha Ultra Compacta Vertical */
        .product-card { 
            border: 1px solid #f0f0f0; 
            transition: all 0.1s ease; 
            background: #fff;
            display: flex;
            align-items: center;
            padding: 4px;
            height: 50px;
        }
        .product-card:hover { border-color: var(--brown); background-color: var(--soft-bg); z-index: 10; }
        
        .thumb-box { 
            background: #f4f4f4; 
            width: 42px; 
            height: 42px; 
            min-width: 42px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            border-radius: 2px;
            margin-right: 10px;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .thumb-box img { width: 100%; height: 100%; object-fit: cover; }
        .thumb-box i { font-size: 12px; color: #ddd; }
        
        .sidebar { width: 170px; border-right: 1px solid #eee; height: calc(100vh - 40px); position: fixed; left: 0; background: white; z-index: 40; }
        .filter-btn { 
            display: flex; 
            justify-content: space-between; 
            padding: 5px 12px;
            cursor: pointer;
            color: var(--grey);
            text-transform: uppercase;
            font-size: 8px;
            letter-spacing: 0.1em;
            transition: all 0.2s;
        }
        .filter-btn:hover { color: var(--brown); padding-left: 15px; }
        .filter-btn.active { color: var(--black); font-weight: 800; border-right: 3px solid var(--brown); background: var(--soft-bg); }
        
        .main-content { margin-left: 170px; padding: 15px; }
        
        @media (max-width: 768px) {
            .sidebar { display: none; }
            .main-content { margin-left: 0; padding-top: 55px; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .modal-overlay { background: rgba(0,0,0,0.85); backdrop-filter: blur(3px); }
    </style>
</head>
<body class="bg-white">

    <!-- Header Black -->
    <header class="fixed top-0 w-full z-50 bg-black text-white px-5 py-2 flex justify-between items-center h-11 shadow-xl">
        <div class="text-xs font-bold tracking-[0.4em] serif uppercase text-[#A68966]">CORDALE</div>
        <div id="global-counter" class="text-[7px] text-gray-400 font-mono tracking-widest uppercase">CATÁLOGO TÉCNICO INTEGRAL</div>
    </header>

    <div class="flex pt-11">
        <!-- Navegação Lateral -->
        <aside class="sidebar overflow-y-auto no-scrollbar py-4">
            <div class="px-4 mb-4">
                <div class="text-[7px] font-bold text-gray-300 uppercase tracking-widest border-b border-gray-100 pb-1">Acervo</div>
            </div>
            <nav id="sidebar-filters"></nav>
        </aside>

        <!-- Grade de Produtos -->
        <main class="main-content flex-1">
            <div class="md:hidden overflow-x-auto no-scrollbar flex space-x-3 mb-4 sticky top-12 bg-white z-30 py-2 border-b" id="mobile-filters"></div>
            
            <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-1.5">
                <!-- Injetado via JS -->
            </div>
        </main>
    </div>

    <!-- Modal Técnico de Detalhes -->
    <div id="product-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4">
        <div class="modal-overlay absolute inset-0" onclick="closeModal()"></div>
        <div class="bg-white w-full max-w-xl relative z-10 shadow-2xl flex flex-col md:flex-row border-t-4 border-[#A68966] overflow-hidden">
            <div class="md:w-1/2 bg-[#121212] p-2 flex items-center justify-center min-h-[250px]">
                <div id="modal-img-container" class="w-full h-full flex items-center justify-center">
                    <!-- Imagem ou Placeholder -->
                </div>
            </div>
            <div class="md:w-1/2 p-7 relative bg-white">
                <button onclick="closeModal()" class="absolute top-3 right-4 text-gray-300 hover:text-black text-2xl transition">&times;</button>
                <div id="modal-cat" class="text-[7px] font-bold text-[#A68966] uppercase tracking-[0.4em] mb-1">Linha Técnica</div>
                <h2 id="modal-title" class="text-lg serif uppercase mb-5 text-black border-b pb-2">--</h2>
                
                <div class="space-y-5">
                    <div>
                        <div class="text-[8px] font-bold uppercase mb-2 text-black tracking-widest">Detalhes do Material</div>
                        <div id="modal-details" class="text-[9px] text-gray-500 uppercase leading-relaxed font-light"></div>
                    </div>
                    <div>
                        <div class="text-[8px] font-bold uppercase mb-2 text-black tracking-widest">Dimensões Técnicas</div>
                        <div id="modal-measures" class="grid grid-cols-1 gap-1"></div>
                    </div>
                </div>
                
                <div class="mt-8 pt-3 border-t border-gray-50 flex justify-between items-center">
                    <div id="modal-id" class="text-[8px] font-mono text-gray-300">REF: --</div>
                    <div class="text-[7px] uppercase tracking-tighter text-gray-200 font-bold italic">DOMARI OUTDOOR</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Dados extraídos diretamente do seu PDF "Domari - Acervo Técnico.pdf"
        const productData = [
            { id: "401001", cat: "Balanço", name: "Balanço 401001", details: "Corda Náutica, Pintura Eletrostática", c: "0,51", p: "0,45", a: "0,41", page: 2 },
            { id: "401002", cat: "Balanço", name: "Balanço 401002", details: "Corda Náutica, Madeira, Pintura Eletrostática", c: "0,74", p: "0,45", a: "0,40", page: 3 },
            { id: "403001", cat: "Banco", name: "Banco 403001", details: "Alumínio Ripado, Pintura Eletrostática", c: "1,50", p: "0,45", a: "0,45", page: 4 },
            { id: "403003", cat: "Banco", name: "Banco 403003", details: "Alumínio Ripado, Pintura Eletrostática", c: "1,20", p: "0,45", a: "0,90", page: 5 },
            { id: "403005", cat: "Banco", name: "Banco 403005", details: "Madeira, Pintura Eletrostática", c: "1,50", p: "0,45", a: "0,45", page: 6 },
            { id: "403006", cat: "Banco", name: "Banco 403006", details: "Alumínio Ripado, Pintura Eletrostática", c: "1,20", p: "0,45", a: "0,45", page: 7 },
            { id: "403008", cat: "Banco", name: "Banco 403008", details: "Madeira, Pintura Eletrostática", c: "1,20", p: "0,45", a: "0,45", page: 8 },
            { id: "405001", cat: "Cadeira", name: "Cadeira 405001", details: "Corda Náutica, Pintura Eletrostática", c: "0,53", p: "0,55", a: "0,76", page: 9 },
            { id: "414007", cat: "Mesa Lateral", name: "Mesa Lateral 414007", details: "Corda Náutica, Pintura Eletrostática", c: "0,45", p: "0,45", a: "0,45", page: 124 },
            { id: "418001", cat: "Puff", name: "Puff 418001", details: "Corda Náutica, Pintura Eletrostática", c: "0,45", p: "0,45", a: "0,45", page: 125 },
            { id: "418004", cat: "Puff", name: "Puff 418004", details: "Corda Náutica, Pintura Eletrostática", c: "0,45", p: "0,45", a: "0,45", page: 126 },
            { id: "418009", cat: "Puff", name: "Puff 418009", details: "Corda Náutica, Pintura Eletrostática", c: "0,45", p: "0,45", a: "0,45", page: 127 },
            { id: "418007", cat: "Puff", name: "Puff 418007", details: "Corda Náutica, Pintura Eletrostática", c: "0,45", p: "0,45", a: "0,45", page: 128 }
        ];

        // Mapeamento automático para as restantes 120+ peças (usando placeholders conforme a lista original)
        const categories = [
            { name: 'Balanço', count: 7, icon: 'fa-circle-dot', prefix: '401' },
            { name: 'Banco', count: 5, icon: 'fa-chair', prefix: '403' },
            { name: 'Banqueta', count: 15, icon: 'fa-chair', prefix: '410' },
            { name: 'Bistrô', count: 3, icon: 'fa-martini-glass', prefix: '411' },
            { name: 'Cadeira', count: 27, icon: 'fa-chair', prefix: '405' },
            { name: 'Chaise', count: 5, icon: 'fa-bed', prefix: '407' },
            { name: 'Espreguiçadeira', count: 10, icon: 'fa-umbrella-beach', prefix: '408' },
            { name: 'Mesa Jantar', count: 10, icon: 'fa-table', prefix: '4141' },
            { name: 'Poltrona', count: 13, icon: 'fa-couch', prefix: '409' },
            { name: 'Sofá', count: 14, icon: 'fa-couch', prefix: '412' },
            { name: 'Mesa Centro', count: 6, icon: 'fa-table', prefix: '4142' },
            { name: 'Mesa Lateral', count: 7, icon: 'fa-table', prefix: '4143' },
            { name: 'Puff', count: 6, icon: 'fa-square', prefix: '418' },
            { name: 'Seat Garden', count: 1, icon: 'fa-leaf', prefix: '420' },
            { name: 'Vaso', count: 2, icon: 'fa-jar', prefix: '430' },
            { name: 'Luminária', count: 1, icon: 'fa-lightbulb', prefix: '425' },
            { name: 'Lareira', count: 1, icon: 'fa-fire', prefix: '435' },
            { name: 'Base Balanço', count: 1, icon: 'fa-anchor', prefix: '4015' }
        ];

        let fullDatabase = [];

        // Gerar base completa mesclando dados reais do PDF com placeholders
        function buildDatabase() {
            categories.forEach(cat => {
                for(let i=1; i<=cat.count; i++) {
                    const id = `${cat.prefix}${i.toString().padStart(3, '0')}`;
                    const realData = productData.find(d => d.id === id);
                    
                    fullDatabase.push({
                        id: id,
                        name: realData ? realData.name : `${cat.name} ${id}`,
                        category: cat.name,
                        icon: cat.icon,
                        details: realData ? realData.details : "Corda Náutica / Alumínio",
                        c: realData ? realData.c : "--",
                        p: realData ? realData.p : "--",
                        a: realData ? realData.a : "--",
                        // Placeholder para as imagens do PDF (usar o nome do item para gerar uma imagem se disponível)
                        img: realData ? `` : null
                    });
                }
            });
        }

        let currentFilter = 'Todos';

        function renderFilters() {
            const sidebar = document.getElementById('sidebar-filters');
            const mobile = document.getElementById('mobile-filters');
            const cats = ['Todos', ...categories.map(c => c.name)];
            
            cats.forEach(c => {
                const count = c === 'Todos' ? fullDatabase.length : categories.find(cat => cat.name === c).count;
                
                const btn = document.createElement('div');
                btn.className = `filter-btn ${currentFilter === c ? 'active' : ''}`;
                btn.innerHTML = `<span>${c}</span> <span class="opacity-20 text-[6px]">${count}</span>`;
                btn.onclick = () => { currentFilter = c; updateFilters(); renderGrid(); };
                sidebar.appendChild(btn);

                const mBtn = document.createElement('button');
                mBtn.className = `whitespace-nowrap px-3 py-1 text-[8px] uppercase tracking-widest ${currentFilter === c ? 'font-black text-black border-b-2 border-[#A68966]' : 'text-gray-400'}`;
                mBtn.innerText = c;
                mBtn.onclick = () => { currentFilter = c; updateFilters(); renderGrid(); };
                mobile.appendChild(mBtn);
            });
        }

        function updateFilters() {
            document.getElementById('sidebar-filters').innerHTML = '';
            document.getElementById('mobile-filters').innerHTML = '';
            renderFilters();
        }

        function renderGrid() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            const filtered = currentFilter === 'Todos' ? fullDatabase : fullDatabase.filter(p => p.category === currentFilter);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card cursor-pointer" onclick="openModal('${p.id}')">
                        <div class="thumb-box">
                            <i class="fa-solid ${p.icon}"></i>
                        </div>
                        <div class="flex flex-col min-w-0">
                            <div class="text-[6px] text-[#A68966] font-bold uppercase tracking-widest">${p.category}</div>
                            <div class="text-[9px] font-bold uppercase truncate pr-2 text-black">${p.name}</div>
                            <div class="text-[7px] text-gray-300 font-mono">#DOM-${p.id}</div>
                        </div>
                    </div>
                `;
            });
        }

        function openModal(id) {
            const p = fullDatabase.find(prod => prod.id === id);
            document.getElementById('modal-title').innerText = p.name;
            document.getElementById('modal-cat').innerText = p.category;
            document.getElementById('modal-id').innerText = `REFERENCE ID: DOM-${p.id}`;
            document.getElementById('modal-details').innerText = p.details;
            
            // Simulação de imagem técnica (substituir por src real se hospedado)
            document.getElementById('modal-img-container').innerHTML = `
                <div class="text-center text-gray-500">
                    <i class="fa-solid ${p.icon} text-6xl mb-4 opacity-10"></i>
                    <div class="text-[9px] uppercase tracking-widest opacity-40">[ Ver Foto no PDF ]</div>
                </div>
            `;
            
            document.getElementById('modal-measures').innerHTML = [
                {l: 'Comprimento', v: p.c},
                {l: 'Profundidade', v: p.p},
                {l: 'Altura', v: p.a}
            ].map(m => `
                <div class="flex justify-between items-center bg-gray-50 px-3 py-1.5 border-l-2 border-[#A68966]">
                    <span class="text-[7px] text-gray-400 font-bold uppercase">${m.l}</span>
                    <span class="text-[10px] font-bold text-gray-800">${m.v} m</span>
                </div>`).join('');
                
            document.getElementById('product-modal').classList.remove('hidden');
        }

        function closeModal() { 
            document.getElementById('product-modal').classList.add('hidden'); 
        }

        window.onload = () => { 
            buildDatabase();
            renderFilters(); 
            renderGrid(); 
        };
    </script>
</body>
</html>
